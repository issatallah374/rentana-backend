spring:
  main:
    lazy-initialization: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 10000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  sql:
    init:
      mode: never

  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}

# =========================================================
# 💳 MPESA (PRODUCTION)
# =========================================================
mpesa:
  consumerKey: ${MPESA_CONSUMER_KEY}
  consumerSecret: ${MPESA_CONSUMER_SECRET}
  shortcode: ${MPESA_SHORTCODE}
  passkey: ${MPESA_PASSKEY}
  callbackUrl: ${MPESA_CALLBACK_URL}
  baseUrl: https://api.safaricom.co.ke

# =========================================================
# 📱 SMS (TERMII) ✅ FIXED
# =========================================================
termii:
  apiKey: ${TERMII_API_KEY}

# =========================================================
# 🔐 OTP CONFIG (PRODUCTION READY)
# =========================================================
otp:
  expiry-minutes: 5

  resend:
    first: 30        # seconds
    second: 60       # 1 min
    third: 90        # 1.5 min
    max: 3600        # 1 hour block after 3 attempts

# =========================================================
# 🌐 SERVER
# =========================================================
server:
  port: ${PORT:10000}
  address: 0.0.0.0

# =========================================================
# 🧾 LOGGING
# =========================================================
logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: WARN
    com.rentmanagement.rentapi.services: INFO