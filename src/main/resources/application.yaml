spring:
  main:
    lazy-initialization: true
    web-application-type: servlet   # 🔥 prevents reactive mis-detection

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 20000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1   # 🔥 THIS IS REQUIRED
    validate-on-migrate: false

  sql:
    init:
      mode: never

  # 🔥 KEEP THIS (prevents crash if env vars missing)
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}

# =========================================================
# 💳 MPESA (PRODUCTION)
# =========================================================
mpesa:
  consumerKey: ${MPESA_CONSUMER_KEY}
  consumerSecret: ${MPESA_CONSUMER_SECRET}
  shortcode: ${MPESA_SHORTCODE}
  passkey: ${MPESA_PASSKEY}
  callbackUrl: ${MPESA_CALLBACK_URL}
  baseUrl: https://api.safaricom.co.ke

# =========================================================
# 📱 SMS (TERMII)
# =========================================================
termii:
  apiKey: ${TERMII_API_KEY}
  senderId: Rentana

# =========================================================
# 🔐 OTP CONFIG
# =========================================================
otp:
  expiry-minutes: 5
  resend:
    first: 30
    second: 60
    third: 90
    max: 3600

# =========================================================
# 🔐 JWT (NEW - REQUIRED)
# =========================================================
jwt:
  secret: ${JWT_SECRET}

# =========================================================
# 🌐 SERVER
# =========================================================
server:
  port: ${PORT:10000}
  address: 0.0.0.0

# =========================================================
# 🧾 LOGGING
# =========================================================
logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.rentmanagement.rentapi: INFO