<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            background: #1e293b;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .paid { background: green; color: white; }
        .reject { background: red; color: white; }
    </style>
</head>

<body>

<h1>💸 Payout Dashboard</h1>

<h2>Platform Wallet</h2>
<div id="wallet">Loading...</div>

<hr>

<h2>Payouts</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Amount</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="payouts"></tbody>
</table>

<script>

    // 🔥 CHANGE THIS ONLY IF DOMAIN CHANGES
    const BASE_URL = "https://www.rentana.online";

    // 🔑 TOKEN (YOU MUST SET THIS IN BROWSER)
    const token = localStorage.getItem("token");

    if (!token) {
        alert("❌ No token found. Put token in console.");
    }

    // ================= WALLET =================
    fetch(BASE_URL + '/api/admin/platform-wallet', {
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("wallet").innerText = "KES " + data.balance;
    });

    // ================= LOAD PAYOUTS =================
    function loadPayouts() {

        fetch(BASE_URL + '/api/admin/payouts', {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("payouts");
            table.innerHTML = "";

            data.forEach(p => {

                let row = "<tr>"
                    + "<td>" + p.id + "</td>"
                    + "<td>" + p.amount + "</td>"
                    + "<td>" + p.destination + "</td>"
                    + "<td>" + p.status + "</td>"
                    + "<td>"
                    + "<button class='paid' onclick=\"markPaid('" + p.id + "')\">PAID</button>"
                    + "<button class='reject' onclick=\"reject('" + p.id + "')\">REJECT</button>"
                    + "</td>"
                    + "</tr>";

                table.innerHTML += row;
            });

        });
    }

    // ================= MARK PAID =================
    function markPaid(id) {

        fetch(BASE_URL + '/api/payouts/' + id + '/mark-paid', {
            method: 'POST',
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(res => res.text())
        .then(() => {
            alert("✅ Paid!");
            loadPayouts();
        })
        .catch(() => alert("❌ Failed"));
    }

    // ================= REJECT =================
    function reject(id) {

        fetch(BASE_URL + '/api/payouts/' + id + '/reject', {
            method: 'POST',
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(() => loadPayouts());
    }

    // INIT
    loadPayouts();

</script>

</body>
</html>
