<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            background: #1e293b;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #020617;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 2px;
        }

        .paid { background: green; color: white; }
        .reject { background: red; color: white; }

        .pending { color: orange; }
        .approved { color: lightgreen; }
        .rejected { color: red; }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .loading {
            color: #94a3b8;
        }
    </style>
</head>

<body>

<h1>💸 Payout Dashboard</h1>

<h2>Platform Wallet</h2>
<div id="wallet" class="loading">Loading...</div>

<hr>

<h2>Payout Requests</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Property</th>
        <th>Amount</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="payouts"></tbody>
</table>

<script>

    const BASE_URL = "https://www.rentana.online";
    const token = localStorage.getItem("token");

    if (!token) {
        alert("❌ No token found. Set token in localStorage.");
    }

    // ================= WALLET =================
    fetch(BASE_URL + '/api/admin/platform-wallet', {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("wallet").innerText = "KES " + data.balance;
    })
    .catch(() => {
        document.getElementById("wallet").innerText = "❌ Failed to load";
    });

    // ================= LOAD PAYOUTS =================
    function loadPayouts() {

        fetch(BASE_URL + '/api/admin/payouts', {
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("payouts");
            table.innerHTML = "";

            data.forEach(p => {

                let statusClass = p.status.toLowerCase();

                let disableButtons = p.status !== "PENDING" ? "disabled" : "";

                let row = `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.propertyId}</td>
                        <td>KES ${p.amount}</td>
                        <td>${p.destination}</td>
                        <td class="${statusClass}">${p.status}</td>
                        <td>
                            <button class="paid ${disableButtons}" onclick="markPaid('${p.id}', this)">PAID</button>
                            <button class="reject ${disableButtons}" onclick="reject('${p.id}', this)">REJECT</button>
                        </td>
                    </tr>
                `;

                table.innerHTML += row;
            });

        })
        .catch(() => alert("❌ Failed to load payouts"));
    }

    // ================= MARK PAID =================
    function markPaid(id, btn) {

        if (!confirm("Mark this payout as PAID?")) return;

        btn.classList.add("disabled");

        fetch(BASE_URL + '/api/payouts/' + id + '/mark-paid', {
            method: 'POST',
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => {
            if (!res.ok) throw new Error();
            return res.text();
        })
        .then(() => {
            alert("✅ Payout processed!");
            loadPayouts();
        })
        .catch(() => {
            alert("❌ Failed to process payout");
            btn.classList.remove("disabled");
        });
    }

    // ================= REJECT =================
    function reject(id, btn) {

        if (!confirm("Reject this payout?")) return;

        btn.classList.add("disabled");

        fetch(BASE_URL + '/api/payouts/' + id + '/reject', {
            method: 'POST',
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => {
            if (!res.ok) throw new Error();
            loadPayouts();
        })
        .catch(() => {
            alert("❌ Failed to reject payout");
            btn.classList.remove("disabled");
        });
    }

    // INIT
    loadPayouts();

</script>

</body>
</html>
