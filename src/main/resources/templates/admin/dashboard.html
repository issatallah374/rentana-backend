<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            background: #1e293b;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #020617;
        }

        button {
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin: 2px;
            border: none;
        }

        .paid { background: green; color: white; }
        .reject { background: red; color: white; }

        .pending { color: orange; }
        .paid-status { color: lightgreen; }
        .rejected { color: red; }

        .disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .small {
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<h1>💸 Admin Payout Dashboard</h1>

<h2>💰 Platform Wallet</h2>
<div id="wallet">Loading...</div>

<hr>

<h2>📊 All Payout Requests</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Property</th>
        <th>Landlord</th>
        <th>Amount</th>
        <th>Method</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Created</th>
        <th>Processed</th>
        <th>National ID</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody id="payouts"></tbody>
</table>

<script>

    const BASE_URL = "https://www.rentana.online";
    const token = localStorage.getItem("token");

    if (!token) {
        alert("❌ No token found. Please login again.");
    }

    // ================= WALLET =================
    async function loadWallet() {
        try {
            const res = await fetch(BASE_URL + '/admin/api/platform-wallet', {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) throw new Error("Failed");

            const data = await res.json();

            document.getElementById("wallet").innerText =
                "KES " + Number(data.balance).toFixed(2);

        } catch (e) {
            document.getElementById("wallet").innerText = "❌ Failed to load";
        }
    }

    // ================= LOAD PAYOUTS =================
    async function loadPayouts() {

        try {
            const res = await fetch(BASE_URL + '/admin/api/payouts', {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) throw new Error("Failed");

            const data = await res.json();

            let table = document.getElementById("payouts");
            table.innerHTML = "";

            if (!data || data.length === 0) {
                table.innerHTML = `<tr><td colspan="11">No payouts found</td></tr>`;
                return;
            }

            data.forEach(p => {

                let statusClass =
                    p.status === "PAID" ? "paid-status" :
                    p.status === "REJECTED" ? "rejected" :
                    "pending";

                let disabled = p.status !== "PENDING" ? "disabled" : "";

                let row = `
                    <tr>
                        <td class="small">${p.id}</td>
                        <td>${p.property_name || p.property_id}</td>
                        <td>${p.landlord_email || "—"}</td>
                        <td>KES ${Number(p.amount).toFixed(2)}</td>
                        <td>${p.method}</td>
                        <td>${p.destination}</td>
                        <td class="${statusClass}">${p.status}</td>
                        <td class="small">${formatDate(p.created_at)}</td>
                        <td class="small">${p.processed_at ? formatDate(p.processed_at) : "—"}</td>
                        <td>${p.national_id || "—"}</td>
                        <td>
                            <button class="paid ${disabled}" onclick="markPaid('${p.id}')">PAID</button>
                            <button class="reject ${disabled}" onclick="rejectPayout('${p.id}')">REJECT</button>
                        </td>
                    </tr>
                `;

                table.innerHTML += row;
            });

        } catch (e) {
            console.error(e);
            alert("❌ Failed to load payouts");
        }
    }

    // ================= FORMAT DATE =================
    function formatDate(dateStr) {
        if (!dateStr) return "—";
        return new Date(dateStr).toLocaleString();
    }

    // ================= MARK PAID =================
    async function markPaid(id) {

        const nationalId = prompt("Enter National ID:");

        if (!nationalId || nationalId.trim().length < 5) {
            alert("❌ Valid National ID required");
            return;
        }

        if (!confirm("Mark as PAID?")) return;

        try {
            const res = await fetch(BASE_URL + `/api/payouts/${id}/mark-paid?nationalId=${encodeURIComponent(nationalId)}`, {
                method: 'POST',
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) {
                const text = await res.text();
                throw new Error(text);
            }

            alert("✅ Marked as PAID");

            loadPayouts();
            loadWallet();

        } catch (e) {
            alert("❌ " + e.message);
        }
    }

    // ================= REJECT =================
    async function rejectPayout(id) {

        if (!confirm("Reject payout?")) return;

        try {
            const res = await fetch(BASE_URL + `/api/payouts/${id}/reject`, {
                method: 'POST',
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) {
                const text = await res.text();
                throw new Error(text);
            }

            alert("❌ Rejected");

            loadPayouts();

        } catch (e) {
            alert("❌ " + e.message);
        }
    }

    // ================= INIT =================
    loadWallet();
    loadPayouts();

</script>

</body>
</html>
