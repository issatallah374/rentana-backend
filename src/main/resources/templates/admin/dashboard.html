<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            background: #1e293b;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #020617;
        }

        button {
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin: 2px;
            border: none;
        }

        .paid { background: green; color: white; }
        .reject { background: red; color: white; }

        .pending { color: orange; }
        .paid-status { color: lightgreen; }
        .rejected { color: red; }

        .disabled {
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>

<body>

<h1>💸 Payout Dashboard</h1>

<h2>Platform Wallet</h2>
<div id="wallet">Loading...</div>

<hr>

<h2>Payout Requests</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Property</th>
        <th>Amount</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="payouts"></tbody>
</table>

<script>

    const BASE_URL = "https://www.rentana.online";
    const token = localStorage.getItem("token");

    if (!token) {
        alert("❌ No token found. Please login again.");
    }

    // ================= WALLET =================
    function loadWallet() {
        fetch(BASE_URL + '/api/admin/platform-wallet', {
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("wallet").innerText = "KES " + data.balance;
        })
        .catch(() => {
            document.getElementById("wallet").innerText = "❌ Failed to load";
        });
    }

    // ================= LOAD PAYOUTS =================
    function loadPayouts() {

        fetch(BASE_URL + '/api/admin/payouts', {
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("payouts");
            table.innerHTML = "";

            data.forEach(p => {

                let statusClass =
                    p.status === "PAID" ? "paid-status" :
                    p.status === "REJECTED" ? "rejected" :
                    "pending";

                let disabled = p.status !== "PENDING" ? "disabled" : "";

                let row = `
                    <tr id="row-${p.id}">
                        <td>${p.id}</td>
                        <td>${p.propertyId}</td>
                        <td>KES ${p.amount}</td>
                        <td>${p.destination}</td>

                        <td id="status-${p.id}" class="${statusClass}">
                            ${p.status}
                        </td>

                        <td>
                            <button id="paid-${p.id}"
                                class="paid ${disabled}"
                                onclick="markPaid('${p.id}')">
                                PAID
                            </button>

                            <button id="reject-${p.id}"
                                class="reject ${disabled}"
                                onclick="rejectPayout('${p.id}')">
                                REJECT
                            </button>
                        </td>
                    </tr>
                `;

                table.innerHTML += row;
            });

        })
        .catch(() => alert("❌ Failed to load payouts"));
    }

    // ================= MARK PAID =================
    function markPaid(id) {

        const nationalId = prompt("Enter National ID (Required):");

        // 🔥 STRICT VALIDATION
        if (!nationalId || nationalId.trim().length < 5) {
            alert("❌ Valid National ID required");
            return;
        }

        if (!confirm("Mark this payout as PAID?")) return;

        fetch(BASE_URL + `/api/payouts/${id}/mark-paid?nationalId=${encodeURIComponent(nationalId)}`, {
            method: 'POST',
            headers: { "Authorization": "Bearer " + token }
        })
        .then(async res => {

            const text = await res.text();

            if (!res.ok) {
                try {
                    const json = JSON.parse(text);
                    throw new Error(json.message || "Failed");
                } catch {
                    throw new Error(text || "Failed to process payout");
                }
            }

        })
        .then(() => {

            alert("✅ Payout marked as PAID");

            // 🔥 RELOAD EVERYTHING (SAFE + CONSISTENT)
            loadPayouts();
            loadWallet();

        })
        .catch(err => {
            alert("❌ " + err.message);
        });
    }

    // ================= REJECT =================
    function rejectPayout(id) {

        if (!confirm("Reject this payout?")) return;

        fetch(BASE_URL + `/api/payouts/${id}/reject`, {
            method: 'POST',
            headers: { "Authorization": "Bearer " + token }
        })
        .then(async res => {

            const text = await res.text();

            if (!res.ok) {
                try {
                    const json = JSON.parse(text);
                    throw new Error(json.message || "Failed");
                } catch {
                    throw new Error(text || "Failed to reject payout");
                }
            }

        })
        .then(() => {

            alert("❌ Payout rejected");

            // 🔥 RELOAD DATA
            loadPayouts();

        })
        .catch(err => {
            alert("❌ " + err.message);
        });
    }

    // ================= INIT =================
    loadWallet();
    loadPayouts();

</script>

</body>
</html>
