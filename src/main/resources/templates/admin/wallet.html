<!DOCTYPE html>
<html>
<head>
    <title>Rentana Admin</title>
</head>

<body>

<h1>Rentana Admin Dashboard</h1>

<h2>Platform Wallet</h2>
<div id="wallet">Loading...</div>

<hr>

<h2>Payouts</h2>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Amount</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="payouts"></tbody>
</table>

<hr>

<h2>Users</h2>
<table border="1">
    <thead>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody id="users"></tbody>
</table>

<script>

    // =========================
    // 🔑 GET TOKEN
    // =========================
    const token = localStorage.getItem("token");

    if (!token) {
        alert("❌ No token found. Please login first.");
    }

    // =========================
    // 📦 COMMON HEADERS
    // =========================
    function authHeaders() {
        return {
            "Authorization": "Bearer " + token
        };
    }

    // =========================
    // 💰 LOAD WALLET
    // =========================
    fetch('/api/admin/platform-wallet', {
        headers: authHeaders()
    })
    .then(function(res){
        if (!res.ok) throw new Error("Wallet failed");
        return res.json();
    })
    .then(function(data){
        document.getElementById("wallet").innerText = "KES " + data.balance;
    })
    .catch(function(err){
        console.error(err);
        document.getElementById("wallet").innerText = "Error loading wallet";
    });

    // =========================
    // 💸 LOAD PAYOUTS
    // =========================
    function loadPayouts() {

        fetch('/api/admin/payouts', {
            headers: authHeaders()
        })
        .then(function(res){
            if (!res.ok) throw new Error("Payouts failed");
            return res.json();
        })
        .then(function(data){

            var table = document.getElementById("payouts");
            table.innerHTML = "";

            data.forEach(function(p){

                var row = "<tr>"
                    + "<td>" + p.id + "</td>"
                    + "<td>" + p.amount + "</td>"
                    + "<td>" + p.destination + "</td>"
                    + "<td>" + p.status + "</td>"
                    + "<td>"
                    + "<button onclick=\"markPaid('" + p.id + "')\">PAID</button>"
                    + "<button onclick=\"reject('" + p.id + "')\">REJECT</button>"
                    + "</td>"
                    + "</tr>";

                table.innerHTML += row;
            });

        })
        .catch(function(err){
            console.error(err);
            alert("❌ Failed to load payouts");
        });
    }

    // =========================
    // ✅ MARK PAID
    // =========================
    function markPaid(id) {
        fetch('/api/payouts/' + id + '/mark-paid', {
            method: 'POST',
            headers: authHeaders()
        })
        .then(function(res){
            if (!res.ok) throw new Error("Mark paid failed");
            return res.text();
        })
        .then(function(){
            alert("✅ Marked as paid");
            loadPayouts();
        })
        .catch(function(err){
            console.error(err);
            alert("❌ Failed to mark paid");
        });
    }

    // =========================
    // ❌ REJECT
    // =========================
    function reject(id) {
        fetch('/api/payouts/' + id + '/reject', {
            method: 'POST',
            headers: authHeaders()
        })
        .then(function(res){
            if (!res.ok) throw new Error("Reject failed");
            return res.text();
        })
        .then(function(){
            alert("❌ Rejected");
            loadPayouts();
        })
        .catch(function(err){
            console.error(err);
            alert("❌ Failed to reject");
        });
    }

    // =========================
    // 👤 LOAD USERS
    // =========================
    fetch('/api/users', {
        headers: authHeaders()
    })
    .then(function(res){
        if (!res.ok) throw new Error("Users failed");
        return res.json();
    })
    .then(function(data){

        var table = document.getElementById("users");

        data.forEach(function(u){

            var row = "<tr>"
                + "<td>" + u.fullName + "</td>"
                + "<td>" + u.email + "</td>"
                + "<td>" + u.role + "</td>"
                + "<td>" + (u.isActive ? "ACTIVE" : "DISABLED") + "</td>"
                + "</tr>";

            table.innerHTML += row;
        });

    })
    .catch(function(err){
        console.error(err);
        alert("❌ Failed to load users");
    });

    // =========================
    // 🚀 INITIAL LOAD
    // =========================
    loadPayouts();

</script>

</body>
</html>
